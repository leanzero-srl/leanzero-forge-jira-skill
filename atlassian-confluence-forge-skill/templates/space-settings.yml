# Testing Your Space Settings Panel:
# 1. Deploy the app: forge deploy
# 2. Install the app in your Confluence instance
# 3. Navigate to a space: /spaces/{spaceKey}/view
# 4. Click "Space settings" or "More settings"
# 5. Your panel should appear in the settings menu