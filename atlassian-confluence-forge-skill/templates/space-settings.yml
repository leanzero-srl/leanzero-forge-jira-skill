# Space Settings Panel Template for Confluence Forge Apps
# 
# This template provides a complete space settings panel configuration
# that allows administrators to configure app settings at the space level.

app:
  id: ari:cloud:ecosystem::app/{your-app-id}
  name: {Your App Name}

permissions:
  scopes:
    - read:confluence-content:*
    - write:confluence-content:*
  scoped:
    - spaces:${SPACE_ID}

modules:
  confluence:spaceSettings:
    - key: {settings-key}
      title: {Settings Panel Title}
      resource: main
      icon: settings-icon.png

  resource:
    - key: main
      path: src/space-settings.jsx

