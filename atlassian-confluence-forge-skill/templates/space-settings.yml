# Space Properties vs Content Properties:
# 
# Space-level settings can be stored in several ways:
# 
# 1. Backend Database - Store settings keyed by spaceKey
#    Pros: Clean separation, easy to query across spaces
#    Cons: Requires backend infrastructure
#
# 2. Content Property on a dedicated config page per space
#    Pros: Uses Confluence storage, no backend needed
#    Cons: More complex to implement
#
# 3. Space property (if available in your Confluence version)
#    Pros: Native space-level storage
#    Cons: Limited availability
#
# Example: Storing space settings using content properties on a config page
#
