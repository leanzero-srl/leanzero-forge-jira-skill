# Webhook Handler Template for Confluence Events
# Handle real-time events from Confluence (page created/updated/deleted)
# Documentation: https://developer.atlassian.com/cloud/confluence/modules/webhook/

modules:
  webhook:
    - key: page-created-handler
      destination: page-created-endpoint
      
    # Optionally handle multiple event types in same handler
    - key: page-updated-handler
      destination: page-updated-endpoint

    # With filtering to only trigger on specific conditions
    - key: filtered-page-handler
      destination: page-created-endpoint
      filter: |
        data.space.key == "PROJ" && 
        !contains(data.content.labels, 'skip-sync')

  resources:
    - key: webhook-handler
      path: src/webhooks/handler.js
      
