---

# Available Confluence Events (pattern: avi:confluence:<action>:<content-type>):
#
# Pages:
# - avi:confluence:created:page
# - avi:confluence:updated:page
# - avi:confluence:viewed:page      (may have limited reliability)
# - avi:confluence:trashed:page
# - avi:confluence:restored:page
# - avi:confluence:deleted:page
# - avi:confluence:archived:page
# - avi:confluence:moved:page
# - avi:confluence:copied:page
#
# Blog Posts:
# - avi:confluence:created:blogpost
# - avi:confluence:updated:blogpost
#
# Comments:
# - avi:confluence:created:comment
# - avi:confluence:updated:comment
# - avi:confluence:deleted:comment
#
# Key facts:
# - Handler signature: (event, context) => {} — NOT Express (req, res)
# - User ID is at event.context.principal.accountId
# - Event delivery may be delayed up to 3 minutes
# - Use @forge/api for backend calls — NOT @forge/bridge (frontend only)
# - Required scope: read:confluence-content.summary
