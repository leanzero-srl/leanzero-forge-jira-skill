# Product Event Trigger Template for Confluence Events
# Handle real-time events from Confluence (page created/updated/deleted)
# Documentation: https://developer.atlassian.com/platform/forge/manifest-reference/modules/trigger/

modules:
  trigger:
    - key: page-created-handler
      function: onPageCreated
      events:
        - avi:confluence:created:page

    - key: page-updated-handler
      function: onPageUpdated
      events:
        - avi:confluence:updated:page

    - key: comment-created-handler
      function: onCommentCreated
      events:
        - avi:confluence:created:comment

  function:
    - key: onPageCreated
      handler: src/triggers/page-created.handler
    - key: onPageUpdated
      handler: src/triggers/page-updated.handler
    - key: onCommentCreated
      handler: src/triggers/comment-created.handler

permissions:
  scopes:
    - read:confluence-content.summary

---
