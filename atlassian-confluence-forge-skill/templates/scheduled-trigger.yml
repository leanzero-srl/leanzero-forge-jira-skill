# Scheduled Trigger Template for Confluence Background Tasks
# Run periodic background jobs (sync, cleanup, reconciliation)
# Documentation: https://developer.atlassian.com/platform/forge/manifest-reference/modules/scheduled-trigger/

modules:
  scheduledTrigger:
    - key: sync-scheduler
      function: syncHandler
      interval: hour          # Options: fiveMinute, hour, day, week

    - key: cleanup-scheduler
      function: cleanupHandler
      interval: week

  function:
    - key: syncHandler
      handler: src/scheduled/sync.handler
      timeoutSeconds: 300
    - key: cleanupHandler
      handler: src/scheduled/cleanup.handler
      timeoutSeconds: 600

---
