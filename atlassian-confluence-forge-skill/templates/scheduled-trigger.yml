---

# Valid interval values:
# - fiveMinute  (every 5 minutes)
# - hour        (every hour)
# - day         (once per day)
# - week        (once per week)
#
# Constraints:
# - Maximum 5 scheduled triggers per app
# - Maximum timeoutSeconds: 900 (15 minutes)
# - Handler signature: (event, context) => {} — NOT Express (req, res)
# - Use @forge/api for backend API calls — NOT @forge/bridge (frontend only)
# - Forge handles auth automatically — no manual Bearer tokens needed
