```bash
# Send a test payload to your endpoint
curl -X POST \
  -H "Content-Type: application/json" \
  -d '{
    "event": {"type": "jira:issue_created"},
    "issue": {
      "id": "123",
      "key": "PROJ-123",
      "fields": {"summary": "Test Issue"}
    }
  }' \
  https://your-external-service.com/jira-webhook
```

