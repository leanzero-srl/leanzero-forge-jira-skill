## Example: Scheduled Cleanup

```javascript
// cleanup.js - Clean up expired entries (run hourly)

const kvStore = require('./db');

async function main() {
  console.log('Cleaning up expired storage entries...');
  await kvStore.cleanupExpired();
  console.log('Cleanup completed');
}

main().catch(console.error);

// Add to cron: 0 * * * * node cleanup.js
```

---

## Notes

- Use proper encryption for sensitive data in your external store
- Implement TTL (time-to-live) to prevent stale cache
- Consider using Redis for high-performance caching
- For Forge apps, use `@forge/kvs` instead of external stores
