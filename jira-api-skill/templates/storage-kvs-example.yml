# Jira Custom Storage via REST API Template
# Implement key-value storage using external services with REST API

## Overview

For key-value storage in Jira integrations, you have two options:

### Option 1: External Key-Value Store (Recommended for API integrations)
Use an external service like AWS DynamoDB, Redis, or your own database:
- Store issue metadata
- Track sync timestamps
- Cache Jira data

### Option 2: Forge KVS (For Forge apps only)
Use `@forge/kvs` module in Forge apps.

This template focuses on **Option 1** - external key-value storage with REST API examples.

---

## Example: External KV Store Implementation

```javascript
// db.js - External database example (Node.js/PostgreSQL)

const { Pool } = require('pg');

class KeyValueStore {
  constructor() {
    this.pool = new Pool({ connectionString: process.env.DATABASE_URL });
  }

  // Get value by key
  async get(key) {
    const result = await this.pool.query(
      'SELECT value FROM kvs WHERE key = $1',
      [key]
    );
    return result.rows[0]?.value || null;
  }

  // Set value with optional TTL
  async set(key, value, ttlSeconds = null) {
    const expiresAt = ttlSeconds 
      ? new Date(Date.now() + ttlSeconds * 1000)
      : null;
    
    await this.pool.query(
      `INSERT INTO kvs (key, value, expires_at)
       VALUES ($1, $2, $3)
       ON CONFLICT (key) DO UPDATE SET value = $2, expires_at = $3`,
      [key, JSON.stringify(value), expiresAt]
    );
  }

  // Delete key
  async delete(key) {
    await this.pool.query('DELETE FROM kvs WHERE key = $1', [key]);
  }

  // Clean expired entries (run periodically)
  async cleanupExpired() {
    await this.pool.query('DELETE FROM kvs WHERE expires_at < NOW()');
  }
}

module.exports = new KeyValueStore();
```

