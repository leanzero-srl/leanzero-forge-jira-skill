## Example: Sync Status Tracking

```javascript
// sync-status.js - Track sync status per issue

const kvStore = require('./db');

async function markIssueSynced(issueKey, externalId) {
  await kvStore.set(`sync:${issueKey}`, {
    externalId,
    syncedAt: new Date().toISOString()
  });
}

async function getIssueSyncStatus(issueKey) {
  return await kvStore.get(`sync:${issueKey}`);
}

async function isIssueSynced(issueKey) {
  const status = await getIssueSyncStatus(issueKey);
  return !!status && new Date() - new Date(status.syncedAt) < 3600000; // Within 1 hour
}
```

