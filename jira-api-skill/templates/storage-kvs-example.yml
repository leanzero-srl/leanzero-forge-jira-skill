## Example: Cache Jira Data

```javascript
// cache.js - Cache Jira data to reduce API calls

const kvStore = require('./db');

async function getCachedIssue(issueKey, forceRefresh = false) {
  if (!forceRefresh) {
    const cached = await kvStore.get(`issue:${issueKey}`);
    if (cached && Date.now() - cached.cachedAt < 300000) { // 5 min TTL
      return cached.data;
    }
  }
  
  // Fetch from Jira API
  const response = await fetch(
    `https://{your-domain}.atlassian.net/rest/api/3/issue/${issueKey}`,
    {
      headers: {'Authorization': `Bearer ${process.env.JIRA_TOKEN}`}
    }
  );
  
  const data = await response.json();
  
  // Cache for 5 minutes
  await kvStore.set(`issue:${issueKey}`, {
    data,
    cachedAt: Date.now()
  }, 300);
  
  return data;
}
```

