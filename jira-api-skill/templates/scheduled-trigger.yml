## Example: Hourly Webhook Reconciliation

```javascript
// reconcile-webhooks.js
async function getIssuesUpdatedSince(sinceTime) {
  // Query for recent changes to reconcile missed webhook events
  const response = await fetch(
    `https://{your-domain}.atlassian.net/rest/api/3/search?jql=project%3DPROJ%20AND%20updated>%22${sinceTime}%22`,
    {
      headers: {
        'Authorization': `Bearer ${process.env.JIRA_TOKEN}`,
        'Accept': 'application/json'
      }
    }
  );
  
  return await response.json();
}

async function processIssue(issue) {
  // Process the issue (same logic as webhook handler)
  console.log(`Processing: ${issue.key}`);
}

async function main() {
  const lastCheck = process.env.LAST_CHECK || '2024-01-01T00:00:00.000Z';
  
  const result = await getIssuesUpdatedSince(lastCheck);
  
  for (const issue of result.issues) {
    await processIssue(issue);
  }
  
  process.env.LAST_CHECK = new Date().toISOString();
}

main().catch(console.error);
```

