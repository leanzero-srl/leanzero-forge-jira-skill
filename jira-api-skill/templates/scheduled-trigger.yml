# Jira Scheduled Task Template (REST API)
# Run periodic background jobs via external scheduler calling Jira REST API

## Overview

For scheduled tasks in Jira integration, you have two options:

### Option 1: External Scheduler (Recommended for API integrations)
Use your own scheduler (cron job, GitHub Actions, AWS Lambda, etc.) to call the Jira REST API:

```bash
# Example: Daily sync via cron
0 2 * * * curl -H "Authorization: Bearer <token>" \
  https://{your-domain}.atlassian.net/rest/api/3/search?jql=project%3DPROJ > /dev/null 2>&1
```

### Option 2: Forge Scheduled Trigger (For Forge apps only)
Use `scheduledTrigger` module in Forge apps.

This template focuses on **Option 1** - external schedulers calling REST API.

---

## Example: Daily Issue Sync

```javascript
// sync-issues.js
const { execSync } = require('child_process');

async function getIssuesUpdatedSince(lastSync) {
  const response = await fetch(
    `https://{your-domain}.atlassian.net/rest/api/3/search?jql=project%3DPROJ%20AND%20updated>%22${lastSync}%22`,
    {
      headers: {
        'Authorization': `Bearer ${process.env.JIRA_TOKEN}`,
        'Accept': 'application/json'
      }
    }
  );
  
  const data = await response.json();
  return data.issues;
}

async function syncIssue(issue) {
  // Your sync logic here
  console.log(`Syncing issue: ${issue.key}`);
}

async function main() {
  const lastSync = process.env.LAST_SYNC || '2024-01-01T00:00:00.000Z';
  
  const issues = await getIssuesUpdatedSince(lastSync);
  console.log(`Found ${issues.length} issues to sync`);
  
  for (const issue of issues) {
    await syncIssue(issue);
  }
  
  process.env.LAST_SYNC = new Date().toISOString();
}

main().catch(console.error);
```

