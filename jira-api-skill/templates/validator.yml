## Get Issue Transitions Available to User

```http
GET /rest/api/3/issue/{issueKey}/transitions HTTP/1.1
Host: {your-domain}.atlassian.net
Authorization: Bearer <token>
Accept: application/json
```

**Response (200 OK):**
```json
{
  "transitions": [
    {
      "id": "21",
      "name": "Resolve Issue",
      "to": {"name": "Done"},
      "hasScreen": false,
      "isGlobal": true,
      "isInitial": false
    }
  ]
}
```

---

## cURL Examples

```bash
# Get workflow transitions for an issue
curl -H "Authorization: Bearer <token>" \
  https://{your-domain}.atlassian.net/rest/api/3/issue/PROJ-123/transitions

# Get transition details
curl -H "Authorization: Bearer <token>" \
  https://{your-domain}.atlassian.net/rest/api/3/workflow/transitions/10001
```

---

## Notes

- Workflow validators are primarily created via Forge apps
- REST API approach is for querying and working with existing workflows
- For custom validation logic, use Forge's `jira:workflowValidator` module
- External services can validate issues before triggering transitions
