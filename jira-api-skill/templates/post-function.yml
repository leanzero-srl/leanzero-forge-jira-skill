## cURL Examples

```bash
# Get workflow with post functions
curl -H "Authorization: Bearer <token>" \
  https://{your-domain}.atlassian.net/rest/api/3/workflow/transitions/10001

# Get workflow details
curl -H "Authorization: Bearer <token>" \
  https://{your-domain}.atlassian.net/rest/api/3/workflow/10000
```

---

## Notes

- Workflow post functions are primarily created via Forge apps
- REST API approach is for querying and understanding workflows
- For custom post-function logic, use Forge's `jira:workflowPostFunction` module
- External webhooks can replicate most post-function behavior
