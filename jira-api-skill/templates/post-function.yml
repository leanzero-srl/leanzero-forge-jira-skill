## Execute External Logic After Transition (Webhook)

For external post-transition actions:

```javascript
// webhook-handler.js

async function handleIssueTransitioned(issue, fromStatus, toStatus) {
  // Your external logic here
  
  if (toStatus === 'Done') {
    // Issue resolved - update external system
    await syncToExternalSystem(issue.key);
  }
  
  if (fromStatus === 'To Do' && toStatus === 'In Progress') {
    // Start work notification
    await sendStartWorkNotification(issue);
  }
}

// Called from webhook handler
app.post('/jira-webhook', async (req, res) => {
  const { event } = req.body;
  
  if (event.type === 'jira:issue_updated' && event.changes.status) {
    const oldStatus = event.changes.status.from;
    const newStatus = event.changes.status.to;
    
    await handleIssueTransitioned(event.issue, oldStatus, newStatus);
  }
  
  res.status(200).json({ status: 'ok' });
});
```

