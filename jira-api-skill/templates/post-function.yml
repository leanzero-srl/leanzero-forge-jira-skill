## Get Workflow Details

```http
GET /rest/api/3/workflow/{workflowId} HTTP/1.1
Host: {your-domain}.atlassian.net
Authorization: Bearer <token>
Accept: application/json
```

**Response (200 OK):**
```json
{
  "id": "10000",
  "name": "Basic Software Development",
  "description": "A basic workflow for software development",
  "transitions": [
    {
      "id": "21",
      "name": "Resolve Issue"
    }
  ]
}
```

