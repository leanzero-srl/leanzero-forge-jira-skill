# Jira Workflow Post Function via REST API Template
# Create and manage workflow post functions using the REST API

## Overview

Workflow post functions in Jira execute logic after a transition. They are typically created via Forge apps using the `jira:workflowPostFunction` module. This template shows:

1. **Querying workflows** to understand existing post functions
2. **Managing transitions with post functions**
3. **External post-transition actions**

---

## Get Workflow Transition with Post Functions

```http
GET /rest/api/3/workflow/transitions/{transitionId} HTTP/1.1
Host: {your-domain}.atlassian.net
Authorization: Bearer <token>
Accept: application/json
```

**Response (200 OK):**
```json
{
  "id": "10001",
  "name": "Start Progress",
  "to": {"id": "3", "name": "In Progress"},
  "postFunctions": [
    {
      "type": "update-issue-field",
      "params": {
        "field": "status",
        "value": "In Progress"
      }
    },
    {
      "type": "fire-event",
      "params": {
        "eventId": "1"
      }
    }
  ]
}
```

