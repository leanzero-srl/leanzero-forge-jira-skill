## Check User Permissions (External Condition)

For external permission-based conditions:

```javascript
// Check if user can see a transition

async function checkUserPermission(issueKey, permission, userToken) {
  const response = await fetch(
    `https://{your-domain}.atlassian.net/rest/api/3/issue/${issueKey}/permissions/${permission}`,
    {
      headers: {
        'Authorization': `Bearer ${userToken}`,
        'Accept': 'application/json'
      }
    }
  );
  
  if (!response.ok) return false;
  
  const data = await response.json();
  return data[permission] && data[permission].editable;
}

// Usage
const canEdit = await checkUserPermission('PROJ-123', 'EDIT_ISSUE', token);
if (canEdit) {
  // Show transition
}
```

---

## Get Issue Permissions for User

```http
GET /rest/api/3/issue/{issueKey}/permissions HTTP/1.1
Host: {your-domain}.atlassian.net
Authorization: Bearer <token>
Accept: application/json
```

**Response (200 OK):**
```json
{
  "PROJ-123": {
    "key": "PROJ-123",
    "permissions": {
      "EDIT_ISSUE": {
        "id": "11",
        "name": "Edit Issue",
        "description": "User can edit the issue",
        "editable": true
      }
    }
  }
}
```

---

## cURL Examples

```bash
# Get transition with conditions
curl -H "Authorization: Bearer <token>" \
  https://{your-domain}.atlassian.net/rest/api/3/workflow/transitions/10001

# Get issue permissions for current user
curl -H "Authorization: Bearer <token>" \
  https://{your-domain}.atlassian.net/rest/api/3/issue/PROJ-123/permissions
```

---

## Notes

- Workflow conditions are primarily created via Forge apps
- REST API approach is for querying and checking conditions
- For custom condition logic, use Forge's `jira:workflowCondition` module
- External services can check permissions before showing transitions
