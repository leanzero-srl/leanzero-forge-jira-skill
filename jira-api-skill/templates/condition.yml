# Jira Workflow Condition via REST API Template
# Create and manage workflow conditions using the REST API

## Overview

Workflow conditions in Jira control visibility of transitions. They are typically created via Forge apps using the `jira:workflowCondition` module. This template shows:

1. **Querying workflows** to understand existing conditions
2. **Managing transition conditions** via REST API
3. **External condition checks**

---

## Get Workflow Transition with Conditions

```http
GET /rest/api/3/workflow/transitions/{transitionId} HTTP/1.1
Host: {your-domain}.atlassian.net
Authorization: Bearer <token>
Accept: application/json
```

**Response (200 OK):**
```json
{
  "id": "10001",
  "name": "Start Progress",
  "to": {"id": "3", "name": "In Progress"},
  "conditions": {
    "type": "AND",
    "conditions": [
      {
        "type": "project-permission",
        "params": {
          "permission": "EDIT_ISSUES"
        }
      }
    ]
  }
}
```

---

## Get Workflow Condition Details

```http
GET /rest/api/3/workflow/condition/{conditionId} HTTP/1.1
Host: {your-domain}.atlassian.net
Authorization: Bearer <token>
Accept: application/json
```

