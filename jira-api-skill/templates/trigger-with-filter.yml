## Filter by Assignee Changes

```javascript
// Handle only issues assigned to specific users

async function processAssignedToMe(issue) {
  const { fields, changelog } = issue;
  
  // Check if assignee was changed in this update
  const assigneeChange = changelog?.items.find(
    item => item.field === 'assignee'
  );
  
  if (!assigneeChange) return false;
  
  // Check if current user is the new assignee
  return assigneeChange.to === getCurrentUserAccountId();
}
```

