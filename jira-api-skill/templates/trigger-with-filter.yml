# Jira Event Trigger with Filtering via REST API Template
# Filter and process Jira events using the REST API

## Overview

Event filtering in Jira integrations can be done at multiple levels:

1. **Webhook filters** - Configure filters when setting up webhooks
2. **Client-side filtering** - Filter events after receiving them
3. **JQL-based queries** - Query only relevant issues

---

## Webhook Filter Examples

### Filter by Project

```json
{
  "name": "PROJ Webhook",
  "url": "https://your-service.com/jira-webhook",
  "events": ["jira:issue_created"],
  "filters": {
    "projectKey": "PROJ"
  }
}
```

### Filter by Issue Type

```json
{
  "name": "Bug Issues Webhook",
  "url": "https://your-service.com/jira-webhook",
  "events": ["jira:issue_updated"],
  "filters": {
    "issueType": "Bug"
  }
}
```

### Complex Filter (JQL-based)

```json
{
  "name": "High Priority Issues Webhook",
  "url": "https://your-service.com/jira-webhook",
  "events": ["jira:issue_created"],
  "filters": {
    "jql": "priority = High OR priority = Blocker"
  }
}
```

