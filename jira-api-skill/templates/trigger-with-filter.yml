## Client-Side Filtering Example

```javascript
// server.js - Filter events on reception

app.post('/jira-webhook', async (req, res) => {
  const { event, issue } = req.body;
  
  // Apply custom filters
  if (!shouldProcessIssue(issue)) {
    console.log('Issue filtered out');
    return res.status(200).json({ status: 'filtered' });
  }
  
  await processIssue(event, issue);
  res.status(200).json({ status: 'processed' });
});

function shouldProcessIssue(issue) {
  const { fields } = issue;
  
  // Filter by project
  if (fields.project.key !== 'PROJ') return false;
  
  // Filter by issue type
  if (!['Bug', 'Story'].includes(fields.issuetype.name)) return false;
  
  // Filter by priority
  if (fields.priority?.name === 'Low') return false;
  
  // Filter by label
  if (fields.labels && fields.labels.includes('skip-webhook')) return false;
  
  return true;
}
```

