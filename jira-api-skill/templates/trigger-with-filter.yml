## cURL Examples with Filters

```bash
# Search filtered issues
curl -H "Authorization: Bearer <token>" \
  "https://{your-domain}.atlassian.net/rest/api/3/search?jql=project%3DPROJ%20AND%20status%3DOpen"

# Get unassigned issues
curl -H "Authorization: Bearer <token>" \
  "https://{your-domain}.atlassian.net/rest/api/3/search?jql=assignee%3Dnull%20AND%20project%3DPROJ"
```

---

## Notes

- Webhook filters reduce unnecessary requests
- Client-side filtering provides more flexibility
- Use JQL for powerful issue queries
- Combine multiple filter types for optimal performance
