## JQL-Based Filtering Query

```javascript
// Query only filtered issues

async function getFilteredIssues(jql, userToken) {
  const response = await fetch(
    `https://{your-domain}.atlassian.net/rest/api/3/search?jql=${encodeURIComponent(jql)}&maxResults=100`,
    {
      headers: {
        'Authorization': `Bearer ${userToken}`,
        'Accept': 'application/json'
      }
    }
  );
  
  const data = await response.json();
  return data.issues;
}

// Usage examples
const highPriorityIssues = await getFilteredIssues(
  'project = PROJ AND priority IN (High, Blocker)',
  token
);

const unassignedBugs = await getFilteredIssues(
  'project = PROJ AND issuetype = Bug AND assignee = null',
  token
);
```

