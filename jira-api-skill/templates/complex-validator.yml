## cURL Examples

```bash
# Get issue for validation
curl -H "Authorization: Bearer <token>" \
  https://{your-domain}.atlassian.net/rest/api/3/issue/PROJ-123?expand=changelog

# Get available transitions
curl -H "Authorization: Bearer <token>" \
  https://{your-domain}.atlassian.net/rest/api/3/issue/PROJ-123/transitions
```

---

## Notes

- REST API validation runs on your external service, not Jira
- Consider rate limits when validating many issues
- Cache validation results for frequently accessed issues
- For Forge apps, use `jira:workflowValidator` module instead
