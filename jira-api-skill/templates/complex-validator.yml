## Example: Pre-Transition Validation Endpoint

```javascript
// Validate before allowing transition to proceed

async function canExecuteTransition(issueKey, transitionId, userToken) {
  // First check basic permissions
  const transitionsResponse = await fetch(
    `https://{your-domain}.atlassian.net/rest/api/3/issue/${issueKey}/transitions`,
    { headers: { 'Authorization': `Bearer ${userToken}` } }
  );
  
  if (!transitionsResponse.ok) return false;
  
  // Check validation rules
  const validation = await validateForTransition(issueKey, transitionId, userToken);
  
  return validation.valid;
}

// Usage in your app
app.post('/validate-transition', async (req, res) => {
  const { issueKey, transitionId } = req.body;
  
  const canExecute = await canExecuteTransition(
    issueKey,
    transitionId,
    req.headers['x-user-token']
  );
  
  res.json({ 
    valid: canExecute,
    message: canExecute ? 'Transition allowed' : 'Validation failed'
  });
});
```

