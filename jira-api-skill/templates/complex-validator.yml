# Jira Complex Validation via REST API Template
# Implement complex validation logic using the REST API

## Overview

Complex validation in Jira can be implemented via:

1. **REST API-based validation** - Validate before transition via external service
2. **JQL-based filtering** - Use JQL to identify issues needing validation
3. **Webhook-triggered validation** - Validate on issue events

---

## Example: Multi-Rule Validation Service

```javascript
// validation-service.js

const VALIDATION_RULES = {
  required_fields: ['summary', 'description', 'assignee'],
  field_constraints: {
    summary: { maxLength: 255, requiredPattern: /^[A-Z]/ },
    description: { minLength: 10 },
    priority: { allowedValues: ['Blocker', 'Critical', 'Major', 'Minor'] }
  },
  conditional_requirements: [
    {
      condition: issue => issue.fields.priority?.name === 'Blocker',
      requirements: ['summary.length > 20', 'description.length > 50']
    }
  ]
};

async function validateIssue(issueKey, userToken) {
  // Fetch issue data
  const response = await fetch(
    `https://{your-domain}.atlassian.net/rest/api/3/issue/${issueKey}?expand=changelog`,
    {
      headers: { 'Authorization': `Bearer ${userToken}` }
    }
  );
  
  if (!response.ok) return { valid: false, errors: ['Failed to fetch issue'] };
  
  const issue = await response.json();
  const fields = issue.fields;
  
  // Run validation rules
  const errors = [];
  
  // Check required fields
  for (const field of VALIDATION_RULES.required_fields) {
    if (!fields[field]) {
      errors.push(`Field '${field}' is required`);
    }
  }
  
  // Check field constraints
  for (const [field, constraints] of Object.entries(VALIDATION_RULES.field_constraints)) {
    const value = fields[field];
    
    if (value && constraints.maxLength && String(value).length > constraints.maxLength) {
      errors.push(`Field '${field}' exceeds maximum length of ${constraints.maxLength}`);
    }
    
    if (value && constraints.minLength && String(value).length < constraints.minLength) {
      errors.push(`Field '${field}' must be at least ${constraints.minLength} characters`);
    }
  }
  
  return { valid: errors.length === 0, errors };
}

module.exports = { validateIssue };
```

