## Example: Conditional Validation

```javascript
// conditional-validation.js

async function validateForTransition(issueKey, transitionId, userToken) {
  // Get issue details
  const issueResponse = await fetch(
    `https://{your-domain}.atlassian.net/rest/api/3/issue/${issueKey}`,
    { headers: { 'Authorization': `Bearer ${userToken}` } }
  );
  
  const issue = await issueResponse.json();
  const fields = issue.fields;
  
  // Transition-specific validation
  switch (transitionId) {
    case '10001': // Start Progress
      if (!fields.assignee) {
        return { valid: false, error: 'Issue must be assigned before starting' };
      }
      break;
      
    case '21': // Resolve Issue
      if (!fields.resolution) {
        return { valid: false, error: 'Resolution is required to resolve issue' };
      }
      if (fields.priority?.name === 'Blocker' && !fields.labels.includes('QA-approved')) {
        return { valid: false, error: 'Blockers require QA approval label' };
      }
      break;
  }
  
  return { valid: true };
}
```

