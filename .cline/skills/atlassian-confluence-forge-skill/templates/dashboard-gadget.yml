# Dashboard Gadget Template for Confluence Forge Apps
# 
# This template provides a complete dashboard gadget configuration
# that can be customized for your specific use case.

app:
  id: ari:cloud:ecosystem::app/{your-app-id}
  name: {Your App Name}

permissions:
  scopes:
    - read:confluence-content:*
    # Add write scope if gadget needs to modify content
    # - write:confluence-content:*
  scoped:
    - spaces:${SPACE_ID}

modules:
  confluence:dashboardGadget:
    - key: {gadget-key}
      title: {Gadget Title}
      description: {Brief description of what this gadget does}
      resource: main
      icon: dashboard-icon.png
      width: 300
      height: 400
      resizable: true
      # Optional: Add configuration dialog
      # configurationResource: config

  resource:
    - key: main
      path: src/dashboard-gadget.jsx
    # Uncomment if using configuration dialog
    # - key: config
    #   path: src/dashboard-gadget-config.jsx

