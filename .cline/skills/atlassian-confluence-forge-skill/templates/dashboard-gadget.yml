# Common Gadget Use Cases:
# 1. Recent Activity Feed - Show recently updated pages/blog posts
# 2. Statistics Dashboard - Display counts and metrics
# 3. Quick Actions - Buttons for common tasks
# 4. External Integration - Show data from Jira, GitHub, etc.
# 5. Search Widget - Quick search functionality
# 6. Announcements - Display important messages

# Styling Tips:
# - Gadgets render in an iframe, so include all CSS inline or via import
# - Use @atlaskit components for consistent styling with Confluence
# - Keep gadgets lightweight and fast-loading
# - Consider responsive design if resizable is enabled

# Performance Best Practices:
# - Cache data and refresh periodically instead of on every render
# - Limit the amount of data fetched (use pagination if needed)
# - Use efficient queries with CQL filters
# - Implement loading states for better UX