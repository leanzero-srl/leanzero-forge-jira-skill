---

# Common Property Keys by Use Case:

# Sync/Integration:
# - 'app-sync-status'        # Last sync timestamp and status
# - 'app-external-id'        # External system reference ID  
# - 'app-sync-history'       # Array of recent sync operations

# Configuration:
# - 'app-page-config'        # Page-specific configuration overrides
# - 'app-feature-toggles'    # Feature flags for this page

# State Tracking:
# - 'app-processing-state'   # Current processing state (pending, in-progress, complete)
# - 'app-metadata'           # Custom metadata stored with the page

# Notes:
# - Properties are key-value pairs stored with content
# - Each property key must be unique per content item
# - Property values can be any JSON-serializable type
# - Use space properties for app-wide configuration