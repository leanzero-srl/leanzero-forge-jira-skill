# Scheduled Trigger Template for Confluence Background Tasks
# Run periodic background jobs (sync, cleanup, reconciliation)
# Documentation: https://developer.atlassian.com/cloud/forge/modules/function-scheduled/

modules:
  function.scheduled:
    - key: sync-scheduler
      resource: scheduler
      # Cron syntax: minute hour day-of-month month day-of-week
      schedule: '0 */6 * * *'     # Every 6 hours
      
    - key: cleanup-scheduler  
      resource: cleanup-handler
      schedule: '0 0 * * 0'        # Weekly (Sunday at midnight)

  resources:
    - key: scheduler
      path: src/scheduled/sync.js
    - key: cleanup-handler
      path: src/scheduled/cleanup.js
      
