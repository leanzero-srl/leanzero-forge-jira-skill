---

# Cron Syntax Reference:
# *    *    *    *    *
# -    -    -    -    -
# |    |    |    |    |
# |    |    |    |    +----- day of week (0-6) (Sunday=0)
# |    |    |    +---------- month (1-12)
# |    |    +--------------- day of month (1-31)
# |    +-------------------- hour (0-23)
# +------------------------- minute (0-59)

# Common schedules:
# - Every 15 minutes: '*/15 * * * *'
# - Every hour:       '0 * * * *'
# - Daily at midnight:'0 0 * * *'
# - Weekly:           '0 0 * * 0'

# Notes:
# - Minimum schedule interval is 6 hours for free tier
# - Premium tier allows more frequent schedules
# - Combine with webhooks for hybrid real-time + reconciliation approach