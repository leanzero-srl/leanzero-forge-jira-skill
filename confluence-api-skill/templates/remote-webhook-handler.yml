## cURL Test Webhook

```bash
# Send a test payload to your endpoint
curl -X POST \
  -H "Content-Type: application/json" \
  -d '{
    "event": {"type": "confluence:page:created"},
    "data": {
      "content": {"id": "123", "title": "Test Page"},
      "space": {"key": "PROJ", "name": "Project"}
    }
  }' \
  https://your-external-service.com/confluence-webhook
```

