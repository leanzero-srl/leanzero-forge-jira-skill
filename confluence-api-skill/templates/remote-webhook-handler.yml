# Confluence Remote Webhook Handler Template
# Receive and process Confluence events via external webhooks

## Overview

To receive Confluence events in your external service:

1. **Set up a webhook endpoint** in Confluence that POSTs to your service
2. **Handle the payload** from Confluence
3. **Process the event** (sync, notify, etc.)

---

## Webhook Endpoint Setup

### In Confluence Admin

1. Go to https://{your-domain}.atlassian.net/jira/settings/developer/make-api-request
2. Create a new webhook with:
   - **Name**: Your App Name Webhook
   - **URL**: https://your-external-service.com/confluence-webhook
   - **Events**: Select events (page created, updated, deleted)
   - **Filters**: Optional (e.g., `data.space.key == "PROJ"`)

### Sample Endpoint Implementation

```javascript
// server.js (Node.js/Express example)
const express = require('express');
const app = express();

app.use(express.json({ verify: verifySignature }));

app.post('/confluence-webhook', (req, res) => {
  const { event, data } = req.body;
  
  console.log(`Received ${event.type} event`);
  
  switch (event.type) {
    case 'confluence:page:created':
      handlePageCreated(data);
      break;
    case 'confluence:page:updated':
      handlePageUpdated(data);
      break;
    case 'confluence:space:created':
      handleSpaceCreated(data);
      break;
  }
  
  res.status(200).json({ status: 'ok' });
});

function handlePageCreated(data) {
  const { content, space } = data;
  console.log(`New page created: ${content.title} in ${space.name}`);
}

// Add other handlers...

app.listen(3000);
```

