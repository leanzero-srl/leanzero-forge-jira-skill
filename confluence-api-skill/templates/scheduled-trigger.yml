## Cron Schedule Examples

| Frequency | Cron Expression |
|-----------|-----------------|
| Every 15 minutes | `*/15 * * * *` |
| Every hour | `0 * * * *` |
| Daily at 2 AM | `0 2 * * *` |
| Weekly (Sunday midnight) | `0 0 * * 0` |
| Monthly (1st day) | `0 0 1 * *` |

---

## Notes

- For production, use a proper scheduler (GitHub Actions, AWS Lambda + CloudWatch, etc.)
- Implement idempotent handlers to handle duplicate events
- Combine webhooks + scheduled reconciliation for reliability
- Use environment variables for tokens and domain configuration
