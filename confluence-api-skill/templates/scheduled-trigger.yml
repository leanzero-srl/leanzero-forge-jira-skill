## Example: Hourly Webhook Reconciliation

```javascript
// reconcile-webhooks.js
async function getEventsSince(sinceTime) {
  // Since webhooks may miss events, query for recent changes
  const response = await fetch(
    `https://{your-domain}.atlassian.net/wiki/api/v2/pages/search?cql=type=page%20AND%20lastModified>="${sinceTime}"`,
    {
      headers: {
        'Authorization': `Bearer ${process.env.CONFLUENCE_TOKEN}`,
        'Accept': 'application/json'
      }
    }
  );
  
  return await response.json();
}

async function processEvent(event) {
  // Process the event (same logic as webhook handler)
  console.log(`Processing: ${event.content.type} - ${event.content.id}`);
}

async function main() {
  const lastCheck = process.env.LAST_CHECK || '2024-01-01T00:00:00.000Z';
  
  const pages = await getEventsSince(lastCheck);
  
  for (const page of pages) {
    await processEvent({ content: page, space: page.space });
  }
  
  // Save current time for next check
  process.env.LAST_CHECK = new Date().toISOString();
}

main().catch(console.error);
```

